name: Python Wheels (maturin)

on:
  pull_request:
    paths:
      - ".github/workflows/python-wheels.yml"
      - "crates/vibrato-core/**"
      - "crates/vibrato-ffi/**"
      - "python/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: python-wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-version:
    name: Validate package version/tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.version }}
      publish_version: ${{ steps.versions.outputs.publish_version }}
    steps:
      - uses: actions/checkout@v4

      - id: versions
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          ffi_py_ver="$(python3 -c 'import tomllib; print(tomllib.load(open("crates/vibrato-ffi/pyproject.toml", "rb"))["project"]["version"])')"
          sdk_py_ver="$(python3 -c 'import tomllib; print(tomllib.load(open("python/pyproject.toml", "rb"))["project"]["version"])')"
          ffi_cargo_ver="$(python3 -c 'import pathlib,re,sys; text=pathlib.Path("crates/vibrato-ffi/Cargo.toml").read_text(encoding="utf-8"); m=re.search(r"^version\\s*=\\s*\"([^\"]+)\"", text, flags=re.M); print(m.group(1)) if m else sys.exit("missing version in crates/vibrato-ffi/Cargo.toml")')"

          echo "Resolved versions:"
          echo "  crates/vibrato-ffi/pyproject.toml: ${ffi_py_ver}"
          echo "  python/pyproject.toml:             ${sdk_py_ver}"
          echo "  crates/vibrato-ffi/Cargo.toml:     ${ffi_cargo_ver}"

          if [[ "${ffi_py_ver}" != "${sdk_py_ver}" ]]; then
            echo "::error::Version mismatch: crates/vibrato-ffi/pyproject.toml=${ffi_py_ver} vs python/pyproject.toml=${sdk_py_ver}"
            exit 1
          fi
          if [[ "${ffi_py_ver}" != "${ffi_cargo_ver}" ]]; then
            echo "::error::Version mismatch: crates/vibrato-ffi/pyproject.toml=${ffi_py_ver} vs crates/vibrato-ffi/Cargo.toml=${ffi_cargo_ver}"
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag_ver="${GITHUB_REF#refs/tags/v}"
            if [[ "${tag_ver}" != "${ffi_py_ver}" ]]; then
              echo "::error::Tag/version mismatch: git tag=v${tag_ver}, package version=${ffi_py_ver}"
              exit 1
            fi
          fi

          publish_version="${ffi_py_ver}"
          if [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then
            if [[ ! "${ffi_py_ver}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::PR publish expects base version in X.Y.Z form, found '${ffi_py_ver}'"
              exit 1
            fi
            publish_version="${ffi_py_ver}.dev${PR_NUMBER}${RUN_NUMBER}${RUN_ATTEMPT}"
          fi

          echo "version=${ffi_py_ver}" >> "${GITHUB_OUTPUT}"
          echo "publish_version=${publish_version}" >> "${GITHUB_OUTPUT}"
          echo "publish_version=${publish_version}"

  build-wheels:
    name: wheel-${{ matrix.os }}-${{ matrix.target }}
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Stamp PR publish version in Python manifests
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PUBLISH_VERSION: ${{ needs.validate-version.outputs.publish_version }}
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          import os

          version = os.environ["PUBLISH_VERSION"]
          targets = [
              Path("crates/vibrato-ffi/pyproject.toml"),
              Path("python/pyproject.toml"),
          ]
          for path in targets:
              text = path.read_text(encoding="utf-8")
              new = re.sub(
                  r'(?m)^version\s*=\s*"[^"]+"',
                  f'version = "{version}"',
                  text,
                  count=1,
              )
              if new == text:
                  raise SystemExit(f"failed to rewrite version in {path}")
              path.write_text(new, encoding="utf-8")
              print(f"stamped {path} -> {version}")
          PY

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: crates/vibrato-ffi
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >-
            --release
            --strip
            --out dist

      - name: Build wheels (macOS/Windows)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: crates/vibrato-ffi
          target: ${{ matrix.target }}
          args: >-
            --release
            --strip
            --out dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crates/vibrato-ffi/dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: sdist
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp PR publish version in Python manifests
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PUBLISH_VERSION: ${{ needs.validate-version.outputs.publish_version }}
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          import os

          version = os.environ["PUBLISH_VERSION"]
          targets = [
              Path("crates/vibrato-ffi/pyproject.toml"),
              Path("python/pyproject.toml"),
          ]
          for path in targets:
              text = path.read_text(encoding="utf-8")
              new = re.sub(
                  r'(?m)^version\s*=\s*"[^"]+"',
                  f'version = "{version}"',
                  text,
                  count=1,
              )
              if new == text:
                  raise SystemExit(f"failed to rewrite version in {path}")
              path.write_text(new, encoding="utf-8")
              print(f"stamped {path} -> {version}")
          PY

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: crates/vibrato-ffi
          args: >-
            --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/vibrato-ffi/dist/*.tar.gz
          if-no-files-found: error

  publish-pr-pypi:
    name: Publish to PyPI (PR)
    needs:
      - validate-version
      - build-wheels
      - build-sdist
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-dist/ \;
          ls -lah release-dist

      - name: Publish artifacts to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs:
      - validate-version
      - build-wheels
      - build-sdist
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-dist/ \;
          ls -lah release-dist

      - name: Publish artifacts to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist
