name: Publish Python Wheels

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Build for Linux, macOS, and Windows
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          
      - name: Build wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Target the specific pyproject.toml in your python directory
          args: --release --out dist --manifest-path python/pyproject.toml
          
      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # CRITICAL: Required for PyPI Trusted Publishing (OIDC)
      contents: read   # Required to read the repo
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Optional: Add this if you want to test against TestPyPI first
          # repository-url: https://test.pypi.org/legacy/
          packages-dir: dist